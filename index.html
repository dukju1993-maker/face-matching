<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 관상/사주 소개팅</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI 관상/사주 소개팅</h1>
        <p>당신의 얼굴 사진으로 관상과 사주를 분석해 인연을 찾아드립니다.</p>
    </header>

    <main>
        <div id="main-content">
            <section id="userInfo">
                <h2>내 정보 입력</h2>
                <form id="userInfoForm">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>성별</label>
                        <div class="gender-selection">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="male" required> 남성
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="female" required> 여성
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="photo">얼굴 사진</label>
                        <div id="drop-zone">
                            <p>여기에 파일을 드래그하거나 클릭하여 업로드하세요.</p>
                            <input type="file" id="photo" name="photo" accept="image/*" required>
                            <div id="image-preview"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">생년월일</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                    <div class="form-group">
                        <label for="birthtime">태어난 시간</label>
                        <input type="time" id="birthtime" name="birthtime" required>
                    </div>
                </form>
            </section>

            <button id="showResultBtn">매칭 결과 보기</button>
        </div>

        <div id="result-page" class="hidden">
            <section id="result">
                <h2>매칭 결과 분석중...</h2>
                <div id="loader" class="loader"></div>
                <div id="resultContent">
                    <!-- 여기에 매칭 결과 리스트가 표시됩니다. -->
                </div>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
