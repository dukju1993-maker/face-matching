<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 관상/사주 소개팅</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI 관상/사주 소개팅</h1>
        <p>당신의 관상과 사주에 꼭 맞는 최고의 인연을 찾아드립니다.</p>
    </header>

    <main>
        <section id="userInfo">
            <h2>내 정보 입력</h2>
            <form id="userInfoForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="photo">얼굴 사진</label>
                    <input type="file" id="photo" name="photo" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label for="birthdate">생년월일</label>
                    <input type="date" id="birthdate" name="birthdate" required>
                </div>
                <div class="form-group">
                    <label for="birthtime">태어난 시간</label>
                    <input type="time" id="birthtime" name="birthtime" required>
                </div>
                <div class="form-group">
                    <label for="height">키 (cm)</label>
                    <input type="number" id="height" name="height" required>
                </div>
                <div class="form-group">
                    <label for="weight">몸무게 (kg)</label>
                    <input type="number" id="weight" name="weight" required>
                </div>
                <div class="form-group">
                    <label for="salary">연봉 (만원)</label>
                    <input type="number" id="salary" name="salary" required>
                </div>
            </form>
        </section>

        <section id="idealType">
            <h2>원하는 이상형</h2>
            <form id="idealTypeForm">
                <div class="form-group">
                    <textarea id="idealTypeText" name="idealTypeText" rows="5" placeholder="이상형의 외모, 성격, 가치관 등을 자유롭게 적어주세요."></textarea>
                </div>
            </form>
        </section>

        <button id="matchingBtn">최고의 인연 찾기</button>

        <section id="result">
            <h2>매칭 결과</h2>
            <div id="resultContent">
                <!-- 여기에 매칭 결과가 표시됩니다. -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
